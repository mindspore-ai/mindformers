seed: 0
output_dir: './output'
load_checkpoint: ''
src_strategy_path_or_dir: ''
auto_trans_ckpt: False
only_save_strategy: False
resume_training: False
# transform_process_num: 256
ignore_data_skip: False
run_mode: 'finetune'

# trainer config
trainer:
  type: CausalLanguageModelingTrainer
  model_name: 'telechat3_1b'

# runner config
runner_config:
  epochs: 10
  batch_size: 1
  sink_mode: True
  sink_size: 1
  gradient_accumulation_steps: 1

use_parallel: True
# parallel context config
parallel:
  parallel_mode: 1 # 0-data parallel, 1-semi-auto parallel, 2-auto parallel, 3-hybrid parallel
  gradients_mean: False
  enable_alltoall: False
  full_batch: True
  enable_parallel_optimizer: True
  strategy_ckpt_save_file: "./ckpt_strategy.ckpt"
  parallel_optimizer_config:
    gradient_accumulation_shard: False
    parallel_optimizer_threshold: 64
parallel_config:
  data_parallel: 512
  model_parallel: 1
  pipeline_stage: 1
  use_seq_parallel: True
  micro_batch_num: 4
  vocab_emb_dp: False
  gradient_aggregation_group: 4
# when model parallel is greater than 1, we can set micro_batch_interleave_num=2, that may accelerate the train process.
micro_batch_interleave_num: 1

# recompute config
recompute_config:
  recompute: False
  select_comm_recompute: False
  select_recompute: False

  parallel_optimizer_comm_recompute: False
  mp_comm_recompute: False
  recompute_slice_activation: False

# callbacks
callbacks:
  - type: MFLossMonitor
  - type: CheckpointMonitor
    prefix: "telechat3_1b"
    save_checkpoint_steps: 10000 #1000
    keep_checkpoint_max: 1000
    integrated_save: False
    async_save: False

# mindspore context init config
context:
  mode: 0 #0--Graph Mode; 1--Pynative Mode
  device_target: "Ascend"
  max_call_depth: 10000
  max_device_memory: "54GB"
  save_graphs: False
  save_graphs_path: "./graph"
  device_id: 0
  jit_config: {"jit_level":"O1"}

model:
  model_config:
    type: TelechatConfig
    auto_register: telechat_config.TelechatConfig
    batch_size: 1 # add for increase predict
    net_name: 'telechat3_1b'
    seq_length: 8192
    hidden_size: 2048
    embedding_size: 1024
    num_layers: 24
    layers_group: 4
    num_heads: 16 #32
    n_kv_heads: 8
    sigma: 0.0048
    mean: 0.0
    vocab_size: 131072
    rms_norm_eps: 1.0e-5
    bos_token_id: 1
    eos_token_id: 2
    pad_token_id: 3
    eod_reset: True
    pp_interleave_num: 1
    out_proj_has_bias: False
    ignore_token_id: -100
    embed_dropout_prob: 0.
    hidden_dropout_prob: 0.
    attention_dropout_prob: 0.
    intermediate_size: 10752 #8192
    res_dtype: "float32"
    compute_dtype: "bfloat16"
    layernorm_compute_type: "float32"
    softmax_compute_type: "float32"
    rotary_dtype: "float32"
    param_init_type: "float32"
    max_position_embeddings: 8192
    scaling_factor:
      beta_fast: 32.0
      beta_slow: 1.0
      factor: 16.0
      mscale: 1.0
      mscale_all_dim: 1.0
      original_max_position_embeddings: 8192 #4096
    theta: 10000
    use_past: False
    pretrain_seqlen: 8192 # seqlen of the pretrain checkpoint
    extend_method: "None" # support "None", "PI", "NTK"
    parallel_optimizer: True
    use_flash_attention: True # FA can accelerate training or finetune
    use_past_shard: False
    repetition_penalty: 1
    max_decode_length: 512
    fine_grain_interleave: 1
    top_k: 3
    top_p: 1
    do_sample: False
  arch:
    type: TelechatForCausalLM
    auto_register: telechat.TelechatForCausalLM

processor:
  return_tensors: ms
  tokenizer:
    vocab_file: "./tokenizer.model"
    unk_token: '<unk>'
    bos_token: '<_start>'
    eos_token: '<_end>'
    pad_token: '<_pad>'
    type: TelechatTokenizer
    auto_register: telechat_tokenizer.TelechatTokenizer

profile: False
profile_start_step: 1
profile_stop_step: 10
init_start_profile: False
profile_communication: False
profile_memory: True
layer_scale: False
layer_decay: 0.65
lr_scale_factor: 256

# aicc
remote_save_url: "Please input obs url on AICC platform."
