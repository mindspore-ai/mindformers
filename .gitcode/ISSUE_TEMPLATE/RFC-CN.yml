name: RFC 提案 (中文)
description: 提交一个新的 RFC (Request for Comments) 提案 (中文版)
title: "[RFC] "
labels: ["kind/rfc"]
body:
  - type: input
    id: authors
    attributes:
      label: 作者 (Authors)
      description: 请填写作者的 GitHub/Gitee 账号 (例如 @nickname)
      placeholder: "@nickname"
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: 状态 (Status)
      options:
        - 已提案 (Proposed)
        - 草稿 (Draft)
        - 评审中 (Reviewing)
        - 已接受 (Accepted)
        - 已拒绝 (Rejected)
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 摘要 (Summary)
      description: 请用一句话或简短段落概括此提案的核心内容（电梯演讲）。
      placeholder: |
        * 本提案旨在通过 [手段] 解决 [问题]，从而实现 [目标]。
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 动机 (Motivation)
      description: 为什么要做这件事？解决什么痛点？
      placeholder: |
        * 问题陈述: 当前存在什么问题或局限性？
        * 价值与影响: 此功能将为 MindFormers 用户带来什么具体收益？
    validations:
      required: true

  - type: textarea
    id: proposed_implementation
    attributes:
      label: 建议实现方案 (Proposed Implementation)
      description: 详细的技术设计方案、架构图、API 接口定义等。
      placeholder: |
        ### 设计思路
        * 描述核心架构和逻辑流程。

        ### 接口设计 (API)
        * 提供代码片段（如新的 Cell、Ops 或配置项）。
        * 说明用户如何使用此功能。
    validations:
      required: true

  - type: textarea
    id: metrics
    attributes:
      label: 验收标准 (Metrics & Verification)
      description: 如何验证功能是否达标？
      placeholder: |
        * 性能指标: 吞吐量、显存占用、TFLOPS 等。
        * 精度指标: 与 PyTorch/Megatron 对齐情况。
        * 测试计划: 单元测试、集成测试场景。

  - type: textarea
    id: drawbacks
    attributes:
      label: 风险与约束 (Drawbacks & Constraints)
      description: 潜在的负面影响、兼容性破坏或依赖项。
      placeholder: |
        * 破坏性变更 (Breaking Changes): 是否影响现有模型/配置？
        * 复杂度与依赖: 是否引入重型依赖或显著增加编译时间？

  - type: textarea
    id: documentation
    attributes:
      label: 文档与易用性 (Documentation & Usability)
      description: 对用户文档和使用体验的变更计划。
      placeholder: |
        * 配置变更: yaml 文件需新增哪些参数？
        * 教程更新: README 或示例文档的修改计划。
