name: RFC 提案 (中文)
description: 提交一个新的 RFC (Request for Comments) 提案 (中文版)
title: "[RFC] "
labels: ["kind/rfc"]
body:
  - type: textarea
    id: background
    attributes:
      label: 背景描述 (Background)
      description: 描述该提案的背景，解决的问题，核心价值，以及达成的目标等。
      placeholder: |
        * 本提案旨在通过 [手段] 解决 [问题]，从而实现 [目标]。
    validations:
      required: true
  
  - type: textarea
    id: usecase
    attributes:
      label: 用例分析 (Use Case)
      description: 针对本提案的各场景用例，描述其主要包含哪些功能点、要实现的关键性能指标、安全隐私以及DFX（兼容性、可维护性、可测试性、可靠性...）要求等。若涉及，还可以包括使用限制、约束和要求等信息。
      placeholder: |
        * 本提案的主要场景用例，使用者是谁，如何使用等。
    validations:
      required: true

  - type: textarea
    id: design_details
    attributes:
      label: 方案设计 (Design details)
      description: 
        根据本提案的场景用例及功能特点，阐述整体设计思路、技术方案、核心逻辑，可包括选择什么软/硬件平台、操作系统、编程模型、使用什么算法，系统架构如何布局，UI如何呈现等。
        根据实现方案的复杂度，可选择采用自然语言，并结合架构图、时序图、活动图或状态机（算法）等适合的方式来辅助设计。
        对本提案所涉及的安全隐私及DFX（兼容性、可维护性、可测试性、可靠性...）等属性影响，也需进行设计。
      placeholder: |
        ### 设计思路
        * 描述核心架构和逻辑流程。

        ### 接口设计 (API)
        * 提供代码片段（如新的 Cell、Ops 或配置项）。
        * 说明用户如何使用此功能。

        ### 影响分析
        * 对系统现有架构，配置，以及兼容性等方面的影响。
        * 对软件复杂度，性能等方面的影响。
    validations:
      required: true

  - type: textarea
    id: user_guide
    attributes:
      label: 使用说明 (User Guide)
      description:
        介绍该功能如何使用，以及使用约束或限制，比如：
        涉及新增接口，接口变更的需要补充接口描述；
        对配置参数需要补充参数说明；
        相关的使用约束和限制说明。
      placeholder: |
        * 描述该功能如何使用，以及使用约束限制等。
    validations:
      required: true

  - type: textarea
    id: test_plan
    attributes:
      label: 测试设计 (Test Plan)
      description: 介绍该功能的测试方法以及测试用例设计，包括单元测试（unit test），集成测试（integration test），端到端测试（e2e test）等。
      placeholder: |
        * 描述该功能的测试方法，包括单元测试、集成测试、端到端测试等。
        * 描述预期的测试目标，包括：
          * 性能指标: 吞吐量、显存占用、TFLOPS 等。
          * 精度指标: 与 PyTorch/Megatron 对齐情况。
    validations:
      required: true

  - type: textarea
    id: drawbacks
    attributes:
      label: 缺点与风险 (Drawbacks)
      description: 
        说明潜在风险（Breaking Change、性能回退、复杂度提升、引入的安全问题）、负面影响（对现有功能/用户的冲击）、实现成本（代码量/维护成本/人力投入）、是否有API或版本兼容性、旧版本迁移方案问题等，给出应对措施。
      placeholder: |
        * 描述该功能的缺点与潜在风险。

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案 (Alternatives)
      description: 该功能有其它备选方案，可以进行对比，说明不选择的理由。
      placeholder: |
        * 描述其它可选方案。
  
  - type: textarea
    id: unresolved_questions
    attributes:
      label: 未解决问题 (Unresolved Questions)
      description: 待社区讨论/决策的开放问题，如硬件适配范围、参数默认值等（需在RFC通过前解决）。
      placeholder: |
        * 描述需要社区进一步讨论/决策的问题。