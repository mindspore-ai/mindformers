checkpoint:
  enable_save: False
  save_path: ""
  save_max: 1
  save_interleaved_steps: 100
  no_save_optim: False
  async_save: False
  prefix: "custom"
  remove_redundancy: False

  load_path: ""
  load_balanced: False
  no_load_optim: True
  load_worker_number: 1

training: # name refers to torchtitan
  steps: 10 # total number of training steps (--train-iters)
  local_batch_size: 1 # per-rank batch size, micro_batch_size in Megatron
  global_batch_size: 32 #16384 # total samples per step across all ranks
  max_norm: 1.0 # enable gradient clipping if value > 0 (--clip-grad)
  seed: 42 # random seed for training
  deterministic: True # enable deterministic training behavior
  rampup_batch_size: [16, 4, 200]

optimizer:
  type: Muon
  weight_decay: 0.1
  momentum: 0.95
  nesterov: True
  matched_adamw_rms: 0.2
  ns_steps: 8
  ns_coefficients: [[[3.4445, -4.7750, 2.0315], 8], [[2.0, -1.5, 0.5], 2]]
  adamw_betas: [0.9, 0.95]
  adamw_eps: 1.e-8
  qk_clip_enabled: True
  qk_clip_threshold: 100.0
  adamw_include: ["*word_embeddings*", "*output_layer*"]
  use_fused_adamw: True

lr_scheduler:
  type: ConstantWarmUpLR
  learning_rate: 1.e-4
  warmup_ratio: 0

parallelism:
  data_parallel_shard: 2
  expert_parallel: 2
  tensor_parallel: 2
  context_parallel: 1
  context_parallel_method: colossal # implementation method for context parallelism
  pipeline_parallel: 2
  pipeline_parallel_schedule: "1f1b" # pipeline execution schedule (e.g., 1F1B)
  pipeline_parallel_microbatch_size: 1
  pipeline_parallel_interleave_num: 2
  pipeline_parallel_layers_per_stage: auto
  sequence_parallel: True

recompute:
  mode: select # selective recomputation
  select_module:
    "layers.*.self_attention.*": [0-15]
    "layers.*.mlp.*": [0-9]

train_dataset:
  dataloader:
    type: MindDataset
    dataset_files: "train_dataset"
    column_names: ["input_ids", "labels", "loss_mask", "position_ids"]
    shuffle: false # whether to shuffle the dataset
  drop_remainder: True # whether to drop the remainder of the dataset
  num_parallel_workers: 8 # number of parallel data loading workers
  prefetch_size: 1 # number of prefetched batches
  numa_enable: False # enable NUMA-aware data loading
  use_distribute_dataset: true

model:
  model_type: deepseek_v4
  architectures: DeepseekV4ForCausalLM
  vocab_size: 131072
  seq_length: 4096
  hidden_size: 768
  moe_intermediate_size: 1024
  moe_shared_expert_intermediate_size: 1024
  num_hidden_layers: 16
  num_nextn_predict_layers: 1
  num_attention_heads: 128
  n_routed_experts: 64
  num_experts_per_tok: 4
  n_shared_experts: 1
  routed_scaling_factor: 2.5
  moe_router_topk_scaling_factor: 2.5
  moe_router_pre_softmax: True
  moe_router_enable_expert_bias: True
  moe_router_bias_update_rate: 0.002
  scoring_func: "sigmoid"
  moe_router_score_function: "sigmoid"
  moe_aux_loss_coeff: 0.002
  moe_router_load_balancing_type: "seq_aux_loss"
  moe_token_drop_policy: "probs"
  num_hash_layers: 3
  moe_grouped_gemm: True
  moe_token_dispatcher_type: "alltoall"

  max_position_embeddings: 4096
  hidden_act: "fusedswiglu"
  rms_norm_eps: 1.e-6
  normalization: "RMSNorm"
  add_bias_linear: False
  use_flash_attention: True
  multi_latent_attention: True
  mla_qkv_concat: True
  kv_lora_rank: 512
  q_lora_rank: 1536
  qk_rope_head_dim: 64
  v_head_dim: 128
  qk_nope_head_dim: 128
  qk_layernorm: True
  qk_clip: True
  attention_dropout: 0.0
  hidden_dropout: 0.0
  params_dtype: "bfloat16"
  compute_dtype: "bfloat16"
  layernorm_compute_dtype: "float32"
  softmax_compute_dtype: "float32"
  rotary_dtype: "float32"
  initializer_range: 0.01
  mtp_loss_scaling_factor: 0.3
  mtp_loss_factor: 0.3
  position_embedding_type: "yarn"
  rope_theta: 10000

  enable_hyper_connections: True
  enable_hc_head: False
  hc_mult: 4
  hc_eps: 1.e-6
  hc_sinkhorn_iters: 0
  experimental_attention_variant: "mla"
