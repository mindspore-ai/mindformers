checkpoint:
  enable_save: False
  save_path: "_checkpoints/ds3_model"
  save_max: 1
  save_interleaved_steps: 100
  no_save_optim: False
  async_save: False
  prefix: "custom"
  remove_redundancy: False

  load_path: ""
  load_balanced: False
  no_load_optim: True
  load_worker_number: 1

training: # name refers to torchtitan
  steps: 10 # total number of training steps
  local_batch_size: 2 # per-rank batch size (corresponds to runner_config: batch_size)
  global_batch_size: 2 # total number of samples processed per step across all ranks
  max_norm: 1.0 # enable gradient clipping if value > 0
  seed: 42 # random seed for training
  deterministic: True # enable deterministic training behavior

optimizer:
  type: AdamW
  betas:
    - 0.9
    - 0.95
  eps: 1.e-8
  weight_decay: 0.01

lr_scheduler:
  type: ConstantWarmUpLR
  learning_rate: 1.e-5
  warmup_ratio: 0

parallelism: # name refers to torchtitan
  # Data Parallelism & FSDP
  data_parallel_shard: -1
  data_parallel_shard_strategy: "optim_grads_params"
  disable_gradient_division: True

  expert_parallel: 1
  tensor_parallel: 1 # tensor parallelism degree (TP size)
  context_parallel: 1 # context parallelism degree (CP size)
  context_parallel_method: colossal # implementation method for context parallelism
  pipeline_parallel: 1 # pipeline parallelism degree (number of pipeline stages)
  pipeline_parallel_schedule: "1f1b" # pipeline execution schedule (e.g., 1F1B)
  pipeline_parallel_microbatch_size: 1 # number of micro-batches per pipeline step
  pipeline_parallel_interleave_num: 1 # number of interleaved model chunks per pipeline stage
  # number of layers assigned to each pipeline stage
  # supports uneven or interleaved layer placement
  pipeline_parallel_layers_per_stage: null
  sequence_parallel: true # enable sequence parallelism

recompute:
  mode: full
  full_recompute_layer: [0-3]

train_dataset:
  dataloader:
    type: MindDataset
    dataset_files: "train_dataset"
    column_names: ["input_ids", "labels", "loss_mask", "position_ids"]
    shuffle: false # whether to shuffle the dataset
  drop_remainder: True # whether to drop the remainder of the dataset
  num_parallel_workers: 8 # number of parallel data loading workers
  prefetch_size: 1 # number of prefetched batches
  numa_enable: False # enable NUMA-aware data loading

model:
  model_type: deepseek_v3
  architectures: DeepseekV3ForCausalLM
  vocab_size: 129280
  seq_length: 4096
  hidden_size: 1792
  intermediate_size: 3072
  num_hidden_layers: 12
  max_position_embeddings: 163840
  hidden_act: "silu"
  num_attention_heads: 8
  rms_norm_eps: 1.e-6
  add_bias_linear: False
  use_flash_attention: True
  multi_latent_attention: True
  mla_qkv_concat: True
  kv_lora_rank: 512
  q_lora_rank: 1536
  qk_rope_head_dim: 64
  v_head_dim: 192
  qk_nope_head_dim: 128
  qk_layernorm: True
  attention_dropout: 0.0
  hidden_dropout: 0.0
  params_dtype: "float32"
  compute_dtype: "bfloat16"
  layernorm_compute_dtype: "float32"
  softmax_compute_dtype: "float32"
  rotary_dtype: "float32"
  initializer_range: 0.01
  num_nextn_predict_layers: 0 # 1
  mtp_loss_scaling_factor: 0.3
  position_embedding_type: "yarn"
  scaling_factor: 40
  beta_fast: 32
  beta_slow: 1
  mscale: 1
  mscale_all_dim: 1
  rope_theta: 10000

  # moe config
  router_dense_type: "float32"
  gated_linear_unit: True
  moe_intermediate_size: 1024
  routed_scaling_factor: 2.5
  first_k_dense_replace: 1
  n_routed_experts: 8
  num_experts_per_tok: 4
  n_shared_experts: 1
  moe_shared_expert_intermediate_size: 1024
  moe_token_dispatcher_type: "alltoall"
  moe_grouped_gemm: True
  moe_router_load_balancing_type: "seq_aux_loss"
  moe_aux_loss_coeff: 0.001
  scoring_func: "sigmoid"
  norm_topk_prob: True
  moe_token_drop_policy: probs
  moe_router_enable_expert_bias: True
  moe_router_bias_update_rate: 0.001
  use_pad_tokens: True
  topk_group: 2
  n_group: 4
